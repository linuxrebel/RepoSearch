<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repo Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #0a0e14; --surface: #11151c; --surface2: #1a1f2b;
    --border: #2a3040; --text: #c5cdd8; --text-dim: #6b7a8d;
    --accent: #39d353; --accent2: #58a6ff; --accent3: #f0883e;
    --tag-bg: #1e2733; --tag-text: #7eb8da;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header {
    border-bottom:1px solid var(--border); padding:1rem 2rem;
    display:flex; align-items:center; gap:1.5rem;
    position:sticky; top:0; background:rgba(10,14,20,0.95); z-index:100;
    backdrop-filter:blur(12px);
  }
  .logo {
    font-family:'JetBrains Mono',monospace; font-weight:600;
    font-size:1.1rem; color:var(--accent); white-space:nowrap;
  }
  .logo span { color:var(--text-dim); font-weight:300; }

  .search-wrap {
    flex:1; max-width:600px; position:relative;
  }
  .search-wrap svg {
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; stroke:var(--text-dim);
  }
  .search-input {
    width:100%; padding:0.6rem 1rem 0.6rem 2.5rem;
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:0.95rem;
    font-family:'DM Sans',sans-serif; outline:none; transition:border 0.2s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  .stats {
    font-family:'JetBrains Mono',monospace; font-size:0.75rem;
    color:var(--text-dim); white-space:nowrap;
  }
  .stats b { color:var(--accent); font-weight:500; }

  .content { padding:1.5rem 2rem; }

  .results-meta {
    font-size:0.85rem; color:var(--text-dim); margin-bottom:1rem;
    font-family:'JetBrains Mono',monospace;
  }
  .results-meta b { color:var(--accent2); }

  .repo-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(420px, 1fr));
    gap:1rem;
  }

  .repo-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:1.2rem 1.4rem;
    transition:border-color 0.2s, transform 0.15s;
    cursor:default; position:relative; overflow:hidden;
  }
  .repo-card:hover {
    border-color:var(--accent2); transform:translateY(-1px);
  }

  .repo-name {
    font-family:'JetBrains Mono',monospace; font-weight:600;
    font-size:1rem; color:var(--accent2); margin-bottom:0.3rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .repo-name a { color:inherit; text-decoration:none; }
  .repo-name a:hover { text-decoration:underline; }

  .score-badge {
    font-size:0.65rem; padding:2px 6px; border-radius:4px;
    font-weight:500; letter-spacing:0.5px;
  }
  .score-high { background:rgba(57,211,83,0.15); color:#39d353; }
  .score-mid  { background:rgba(240,136,62,0.15); color:#f0883e; }
  .score-low  { background:rgba(107,122,141,0.15); color:#6b7a8d; }

  .repo-path {
    font-family:'JetBrains Mono',monospace; font-size:0.75rem;
    color:var(--text-dim); margin-bottom:0.5rem;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .repo-desc {
    font-size:0.85rem; color:var(--text); line-height:1.5;
    margin-bottom:0.7rem; display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }

  .repo-tags { display:flex; flex-wrap:wrap; gap:0.35rem; }
  .tag {
    font-family:'JetBrains Mono',monospace; font-size:0.7rem;
    background:var(--tag-bg); color:var(--tag-text);
    padding:2px 8px; border-radius:4px; cursor:pointer;
    transition:background 0.15s;
  }
  .tag:hover { background:var(--accent2); color:var(--bg); }

  .repo-meta {
    display:flex; gap:1rem; margin-top:0.6rem;
    font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim);
  }

  .empty {
    text-align:center; padding:4rem; color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
  }
  .empty .big { font-size:2rem; margin-bottom:0.5rem; }

  .tag-cloud {
    display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1.5rem;
    padding:1rem; background:var(--surface); border-radius:10px;
    border:1px solid var(--border);
  }
  .tag-cloud .tag { font-size:0.72rem; }
  .tag-cloud-toggle {
    font-family:'JetBrains Mono',monospace; font-size:0.8rem;
    color:var(--accent2); cursor:pointer; margin-bottom:0.8rem;
    display:inline-flex; align-items:center; gap:0.4rem;
    border:none; background:none;
  }
  .tag-cloud-toggle:hover { color:var(--accent); }

  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid var(--border); border-top-color:var(--accent);
    border-radius:50%; animation:spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .search-mode {
    display:flex; gap:0.5rem; align-items:center;
  }
  .mode-btn {
    font-family:'JetBrains Mono',monospace; font-size:0.7rem;
    padding:4px 10px; border-radius:5px; border:1px solid var(--border);
    background:transparent; color:var(--text-dim); cursor:pointer;
    transition:all 0.15s;
  }
  .mode-btn.active { background:var(--accent2); color:var(--bg); border-color:var(--accent2); }
  .mode-btn:hover:not(.active) { border-color:var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">repo<span>/</span>browser</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Search repos… e.g. 'kubernetes monitoring' or 'container orchestration'" autofocus>
  </div>
  <div class="search-mode">
    <button class="mode-btn active" data-mode="both">both</button>
    <button class="mode-btn" data-mode="keyword">keyword</button>
    <button class="mode-btn" data-mode="semantic">semantic</button>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="content">
  <button class="tag-cloud-toggle" id="tagToggle">▸ tags</button>
  <div class="tag-cloud" id="tagCloud" style="display:none"></div>
  <div class="results-meta" id="resultsMeta"></div>
  <div class="repo-grid" id="repoGrid"></div>
</div>

<script>
const grid = document.getElementById('repoGrid');
const meta = document.getElementById('resultsMeta');
const input = document.getElementById('searchInput');
const statsEl = document.getElementById('stats');
const tagCloud = document.getElementById('tagCloud');
const tagToggle = document.getElementById('tagToggle');

let debounceTimer = null;
let searchMode = 'both';
let allRepos = [];

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.mode-btn.active').classList.remove('active');
    btn.classList.add('active');
    searchMode = btn.dataset.mode;
    doSearch();
  });
});

// Tag cloud toggle
tagToggle.addEventListener('click', () => {
  const open = tagCloud.style.display !== 'none';
  tagCloud.style.display = open ? 'none' : 'flex';
  tagToggle.textContent = (open ? '▸' : '▾') + ' tags';
});

// Stats
fetch('/api/stats').then(r=>r.json()).then(d => {
  statsEl.innerHTML = `<b>${d.total_repos}</b> repos · <b>${d.embedded}</b> embedded · <b>${d.unique_tags}</b> tags`;
});

// Tags
fetch('/api/tags').then(r=>r.json()).then(d => {
  tagCloud.innerHTML = d.tags
    .filter(t => t.count >= 3)
    .map(t => `<span class="tag" onclick="searchTag('${t.tag}')">${t.tag} <small style="opacity:0.5">${t.count}</small></span>`)
    .join('');
});

function searchTag(tag) {
  input.value = tag;
  doSearch();
}

// Search
input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 250);
});

async function doSearch() {
  const q = input.value.trim();
  if (!q) {
    meta.innerHTML = '';
    return renderAll();
  }

  meta.innerHTML = '<span class="spinner"></span> searching…';
  const t0 = performance.now();
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  const ms = Math.round(performance.now() - t0);

  let repos = data.repos;
  if (searchMode === 'keyword') {
    repos = repos.filter(r => r.fts_score > 0).sort((a,b) => b.fts_score - a.fts_score);
  } else if (searchMode === 'semantic') {
    repos = repos.filter(r => r.sem_score > 0).sort((a,b) => b.sem_score - a.sem_score);
  }

  meta.innerHTML = `<b>${repos.length}</b> results for "<b>${esc(q)}</b>" in ${ms}ms`;
  renderRepos(repos, true);
}

async function renderAll() {
  if (allRepos.length === 0) {
    const res = await fetch('/api/search?q=');
    const data = await res.json();
    allRepos = data.repos;
  }
  meta.innerHTML = `showing all <b>${allRepos.length}</b> repos`;
  renderRepos(allRepos, false);
}

function renderRepos(repos, showScore) {
  grid.innerHTML = repos.map(r => {
    const tags = (r.tags || '').split(', ').filter(Boolean);
    const scoreClass = r.score >= 0.5 ? 'score-high' : r.score >= 0.25 ? 'score-mid' : 'score-low';
    const scoreBadge = showScore && r.score !== undefined
      ? `<span class="score-badge ${scoreClass}">${(r.score * 100).toFixed(0)}%</span>` : '';

    const url = r.url || '';
    const webUrl = url.replace(/\.git$/, '')
      .replace(/^git@([^:]+):/, 'https://$1/')
      .replace(/^ssh:\/\/git@([^/]+)\//, 'https://$1/');
    const nameHtml = webUrl
      ? `<a href="${esc(webUrl)}" target="_blank" rel="noopener">${esc(r.name)}</a>`
      : esc(r.name);

    const lastCommit = r.last_commit
      ? new Date(r.last_commit).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})
      : '';

    return `<div class="repo-card">
      <div class="repo-name">${nameHtml} ${scoreBadge}</div>
      <div class="repo-path">${esc(r.path)}</div>
      ${r.description ? `<div class="repo-desc">${esc(r.description)}</div>` : ''}
      <div class="repo-tags">${tags.map(t => `<span class="tag" onclick="searchTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
      <div class="repo-meta">
        ${r.default_branch ? `<span>⎇ ${esc(r.default_branch)}</span>` : ''}
        ${lastCommit ? `<span>⏱ ${lastCommit}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial load
renderAll();
</script>
</body>
</html>
